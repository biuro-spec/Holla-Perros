<!doctype html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hOla Perros — linki</title>
<meta name="description" content="hOla Perros — salon groomerski Racibórz. Umów wizytę: telefon, WhatsApp, oferta, galeria." />
<link rel="icon" type="image/png" href="../favicon-192.png" />
<meta name="theme-color" content="#E49FB3" />
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{--gold:#B8922A;--pink:#E49FB3;--bg:#FCFBF8;--dark:#2D2825;--light:#8a807a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:linear-gradient(170deg,rgba(228,159,179,0.22) 0%,var(--bg) 40%,rgba(184,146,42,0.16) 100%);min-height:100vh;color:var(--dark);display:flex;justify-content:center;padding:40px 20px}
  .wrap{width:100%;max-width:440px;text-align:center}
  .logo{width:120px;height:120px;border-radius:50%;object-fit:cover;margin:0 auto 18px;border:3px solid #fff;box-shadow:0 8px 28px rgba(184,146,42,0.22)}
  h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;margin-bottom:4px}
  .tag{color:var(--light);font-size:0.95rem;margin-bottom:6px}
  .loc{color:var(--gold);font-size:0.85rem;font-weight:600;margin-bottom:28px;letter-spacing:0.5px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 20px;margin-bottom:14px;border-radius:14px;background:#fff;color:var(--dark);text-decoration:none;font-weight:600;font-size:1rem;box-shadow:0 4px 16px rgba(0,0,0,0.06);transition:transform .2s,box-shadow .2s,background .2s;border:1px solid rgba(184,146,42,0.18)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(184,146,42,0.18)}
  .btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
  .btn.pink{background:var(--pink);color:#fff;border-color:var(--pink)}
  .btn.wa{background:#25D366;color:#fff;border-color:#25D366}
  .ico{font-size:1.2rem;line-height:1}
  .foot{margin-top:24px;color:var(--light);font-size:0.8rem}
  .foot a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
  <div class="wrap">
    <img src="../zdjecia/logo.webp" alt="hOla Perros" class="logo" onerror="this.style.display='none'" />
    <h1>hOla Perros</h1>
    <p class="tag">Salon groomerski · psi fryzjer 🐾</p>
    <p class="loc">📍 Racibórz, ul. Opawska 67</p>

    <a class="btn gold" href="tel:+48512501558"><span class="ico">📞</span> Zadzwoń i umów wizytę</a>
    <a class="btn wa" href="https://wa.me/48512501558?text=Dzie%C5%84%20dobry!%20Chcia%C5%82(a)bym%20um%C3%B3wi%C4%87%20wizyt%C4%99%20dla%20mojego%20psa%20%F0%9F%90%BE" target="_blank" rel="noreferrer"><span class="ico">💬</span> Napisz na WhatsApp</a>
    <a class="btn" href="../"><span class="ico">✨</span> Oferta i cennik usług</a>
    <a class="btn" href="../#/metamorfozy"><span class="ico">📸</span> Galeria metamorfoz</a>
    <a class="btn pink" href="https://www.instagram.com/holaperros_salon" target="_blank" rel="noreferrer"><span class="ico">📷</span> Instagram</a>
    <a class="btn" href="https://maps.google.com/?q=Opawska+67,+47-400+Racibórz" target="_blank" rel="noreferrer"><span class="ico">🗺️</span> Jak dojechać</a>

    <p class="foot">© hOla Perros · <a href="../">strona główna</a></p>
  </div>
</body>
