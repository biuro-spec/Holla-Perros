<style>
  :root{--gold:#B8922A;--gold-d:#9c7c1f;--pink:#E49FB3;--pink-d:#d6849b;--bg:#FCFBF8;--dark:#2D2825;--light:#8a807a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--dark);display:flex;justify-content:center;padding:44px 20px;position:relative;overflow-x:hidden}
  /* tło: miękkie blaski marki */
  body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);z-index:0;pointer-events:none}
  body::before{width:380px;height:380px;background:rgba(228,159,179,0.4);top:-120px;left:-100px}
  body::after{width:420px;height:420px;background:rgba(184,146,42,0.28);bottom:-140px;right:-120px}
  .wrap{width:100%;max-width:430px;text-align:center;position:relative;z-index:1}

  .logo-ring{width:130px;height:130px;margin:0 auto 4px;border-radius:50%;padding:4px;background:linear-gradient(135deg,var(--gold),var(--pink));box-shadow:0 10px 34px rgba(184,146,42,0.3);animation:pop .7s cubic-bezier(.2,.8,.2,1) both}
  .logo-ring .inner{width:100%;height:100%;border-radius:50%;background:#fff;border:3px solid #fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .logo-ring .inner img{width:74%;height:74%;object-fit:contain}
  .logo-napis{width:230px;max-width:72%;height:auto;margin:0 auto 6px;display:block;animation:fadeUp .6s .05s both}
  h1{font-family:'Cormorant Garamond',serif;font-size:2.3rem;font-weight:600;margin-bottom:4px;animation:fadeUp .6s .05s both}
  .tag{color:var(--light);font-size:0.95rem;margin-bottom:6px;animation:fadeUp .6s .1s both}
  .loc{color:var(--gold);font-size:0.85rem;font-weight:600;margin-bottom:30px;letter-spacing:0.5px;animation:fadeUp .6s .15s both}

  .btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 22px;margin-bottom:14px;border-radius:16px;text-decoration:none;font-weight:600;font-size:1rem;transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s;animation:fadeUp .55s both;position:relative;overflow:hidden}
  .btn:hover{transform:translateY(-3px)}
  .btn span.t{flex:1;text-align:left}
  .btn .ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .btn .ic svg{width:19px;height:19px;stroke-width:2.1}

  /* warianty w kolorach marki */
  .btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#fff;box-shadow:0 8px 22px rgba(184,146,42,0.34)}
  .btn.gold:hover{box-shadow:0 14px 30px rgba(184,146,42,0.44)}
  .btn.gold .ic{background:rgba(255,255,255,0.22)}
  .btn.pink{background:linear-gradient(135deg,var(--pink),var(--pink-d));color:#fff;box-shadow:0 8px 22px rgba(228,159,179,0.36)}
  .btn.pink:hover{box-shadow:0 14px 30px rgba(228,159,179,0.46)}
  .btn.pink .ic{background:rgba(255,255,255,0.25)}
  .btn.ghost{background:rgba(255,255,255,0.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--dark);border:1px solid rgba(184,146,42,0.28);box-shadow:0 6px 18px rgba(45,40,37,0.06)}
  .btn.ghost:hover{border-color:var(--gold);box-shadow:0 12px 26px rgba(184,146,42,0.18)}
  .btn.ghost .ic{background:rgba(184,146,42,0.12);color:var(--gold)}

  /* shine na głównym przycisku */
  .btn.gold::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,0.4),transparent);transform:skewX(-20deg);animation:shine 3.4s ease-in-out infinite}

  .b1{animation-delay:.2s}.b2{animation-delay:.27s}.b3{animation-delay:.34s}.b4{animation-delay:.41s}.b5{animation-delay:.48s}.b6{animation-delay:.55s}.b7{animation-delay:.62s}

  .foot{margin-top:24px;color:var(--light);font-size:0.8rem;animation:fadeUp .6s .6s both}
  .foot a{color:var(--gold);text-decoration:none}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
  @keyframes shine{0%,60%{left:-60%}100%{left:160%}}
</style>
</head>
